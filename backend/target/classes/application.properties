# ===============================
# Portal de Adherencia a Medicamentos - Configuración backend
# ===============================
spring.application.name=adherencia

server.port=${SERVER_PORT:8080}
server.servlet.context-path=/

# ---- MySQL ----
spring.datasource.url=${MYSQL_URL:jdbc:mysql://localhost:3306/adherencia?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
spring.datasource.username=${MYSQL_USER:adherencia_user}
spring.datasource.password=${MYSQL_PASSWORD:1234}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# ---- MongoDB ----
spring.data.mongodb.uri=${MONGO_URI:mongodb://localhost:27017/adherencia_historial}

# ---- Seguridad JWT ----
app.jwt.secret=${JWT_SECRET:CambiarEstaClaveSecretaEnProduccionPorUnaMuchoMasLargaYSegura123456}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}
app.jwt.issuer=portal-adherencia-medicamentos

# ---- CORS ----
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173}

# ---- Email ----
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
app.notifications.email.enabled=${EMAIL_NOTIFICATIONS_ENABLED:false}

# ---- Firebase ----
app.notifications.firebase.enabled=${FIREBASE_NOTIFICATIONS_ENABLED:false}
app.notifications.firebase.credentials-path=${FIREBASE_CREDENTIALS_PATH:classpath:firebase/firebase-service-account.json}

# ---- WhatsApp ----
app.notifications.whatsapp.enabled=${WHATSAPP_NOTIFICATIONS_ENABLED:false}
app.notifications.whatsapp.api-url=${WHATSAPP_API_URL:https://graph.facebook.com/v19.0}
app.notifications.whatsapp.phone-number-id=${WHATSAPP_PHONE_NUMBER_ID:}
app.notifications.whatsapp.access-token=${WHATSAPP_ACCESS_TOKEN:}

# ---- Logging ----
logging.level.com.certus.adherencia=INFO